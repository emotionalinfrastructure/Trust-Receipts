name: Validate operational service

on:
  pull_request:
    paths:
      - "service/**"
      - ".github/workflows/validate-service.yml"
      - ".github/workflows/deploy-service.yml"
      - ".github/workflows/deploy-temporary-live.yml"
  push:
    branches: [main]
    paths:
      - "service/**"
      - ".github/workflows/validate-service.yml"
      - ".github/workflows/deploy-service.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate candidate configuration
        run: npm run validate:config

      - name: Validate OpenAPI contract
        run: npm run validate:openapi

      - name: Run service tests
        run: npm test

      - name: Bundle Worker without deploying
        run: npx --yes wrangler@4.112.0 deploy --dry-run --outdir dist

  permanent-cloudflare-preflight:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/cloudflare-temporary-live-20260721'
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Confirm protected credentials exist
        shell: bash
        run: |
          set -euo pipefail
          test -n "${CLOUDFLARE_ACCOUNT_ID:-}"
          test -n "${CLOUDFLARE_API_TOKEN:-}"

      - name: Authenticate to Cloudflare
        shell: bash
        run: npx --yes wrangler@4.112.0 whoami >/dev/null
