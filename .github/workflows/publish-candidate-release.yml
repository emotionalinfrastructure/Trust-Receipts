name: Publish candidate release

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/publish-candidate-release.yml"
      - "pyproject.toml"
      - "release/AI_Trust_Receipt_Complete_Release_v*.zip"
      - "release/RELEASE_NOTES_v*.md"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-candidate-release
  cancel-in-progress: false

jobs:
  verify-and-publish:
    name: Verify and publish candidate
    runs-on: ubuntu-latest
    env:
      SOURCE_DATE_EPOCH: "1784419200"
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Check out release commit
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Resolve candidate release files
        id: release
        shell: bash
        run: |
          set -euo pipefail
          version="$(sed -n 's/^version = "\(.*\)"/\1/p' pyproject.toml | head -n 1)"
          if [[ -z "${version}" ]]; then
            echo "Could not resolve the project version" >&2
            exit 1
          fi
          tag="v${version}"
          asset="release/AI_Trust_Receipt_Complete_Release_${tag}.zip"
          notes="release/RELEASE_NOTES_${tag}.md"
          test -f "${asset}"
          test -f "${notes}"
          {
            echo "version=${version}"
            echo "tag=${tag}"
            echo "asset=${asset}"
            echo "notes=${notes}"
          } >> "${GITHUB_OUTPUT}"

      - name: Install reference implementation
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run Python tests
        run: python -m unittest discover -s tests -v

      - name: Verify browser and Python digest parity
        run: node tools/verify_browser_parity.mjs

      - name: Run conformance vectors
        run: |
          python -m trust_receipt conformance run \
            --cases fixtures/conformance-cases.json \
            --profile profiles/conformance-profile.v0.1.json \
            --output "${RUNNER_TEMP}/conformance-report.json"

      - name: Verify example receipt
        run: |
          python -m trust_receipt receipt verify \
            --receipt evidence/example-receipt.json

      - name: Reproduce verification evidence
        run: python tools/verify_release.py

      - name: Verify repository and archive digests
        shell: bash
        run: |
          set -euo pipefail
          sha256sum -c release/SHA256SUMS_REPOSITORY.txt
          extract_dir="${RUNNER_TEMP}/candidate-release"
          mkdir -p "${extract_dir}"
          unzip -q "${{ steps.release.outputs.asset }}" -d "${extract_dir}"
          package_root="${extract_dir}/AI_Trust_Receipt_Complete_Release_${{ steps.release.outputs.tag }}"
          test -d "${package_root}"
          (
            cd "${package_root}"
            sha256sum -c SHA256SUMS.txt
          )

      - name: Publish GitHub prerelease
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.release.outputs.tag }}"
          if gh release view "${tag}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "GitHub release ${tag} already exists; nothing to publish."
            exit 0
          fi
          gh release create "${tag}" \
            "${{ steps.release.outputs.asset }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --target "${GITHUB_SHA}" \
            --title "AI Trust Receipt Candidate ${tag}" \
            --notes-file "${{ steps.release.outputs.notes }}" \
            --prerelease
