name: Deploy operational service

on:
  workflow_dispatch:
    inputs:
      apply_migrations:
        description: "Apply pending D1 migrations before deployment"
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: trust-receipt-production
  cancel-in-progress: false

env:
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  TRUST_RECEIPT_BASE_URL: ${{ vars.TRUST_RECEIPT_BASE_URL }}
  TRUST_RECEIPT_SMOKE_ORIGIN: ${{ vars.TRUST_RECEIPT_SMOKE_ORIGIN }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: production
      url: ${{ vars.TRUST_RECEIPT_BASE_URL }}
    defaults:
      run:
        working-directory: service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate production configuration
        run: npm run validate:config:production

      - name: Validate API contract
        run: npm run validate:openapi

      - name: Validate service and Worker bundle
        run: npm run check

      - name: Apply D1 migrations
        if: ${{ inputs.apply_migrations }}
        run: npm run db:migrate:remote

      - name: Deploy Worker
        run: npm run deploy

      - name: Verify public deployment
        run: npm run smoke
