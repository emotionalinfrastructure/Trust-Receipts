name: Deploy operational service

on:
  workflow_dispatch:
    inputs:
      apply_migrations:
        description: "Apply pending D1 migrations before deployment"
        required: true
        default: true
        type: boolean

permissions:
  contents: read

env:
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate service
        run: npm run check

      - name: Apply D1 migrations
        if: ${{ inputs.apply_migrations }}
        run: npm run db:migrate:remote

      - name: Deploy Worker
        run: npm run deploy
