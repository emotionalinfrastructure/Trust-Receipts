name: Assemble operational service sources

on:
  push:
    branches:
      - agent/operational-trust-receipt-service
    paths:
      - ".github/service-source-parts/**"
      - ".github/workflows/assemble-operational-service.yml"

permissions:
  contents: write

jobs:
  assemble:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/operational-trust-receipt-service
          fetch-depth: 0

      - name: Assemble reviewable source files
        shell: bash
        run: |
          set -euo pipefail
          cat .github/service-source-parts/validation.* > service/src/validation.mjs
          cat .github/service-source-parts/index.* > service/src/index.mjs
          mkdir -p service/test
          cat .github/service-source-parts/test.* > service/test/service.test.mjs
          cat .github/service-source-parts/readme.* > service/README.md
          cat .github/service-source-parts/gitignore.* > .gitignore
          cat .github/service-source-parts/changelog.* > CHANGELOG.md

          cmp service/src/validation.mjs <(cat .github/service-source-parts/validation.*)
          cmp service/src/index.mjs <(cat .github/service-source-parts/index.*)
          cmp service/test/service.test.mjs <(cat .github/service-source-parts/test.*)

          rm -rf .github/service-source-parts
          rm -f .github/service-bootstrap.tgz.b64
          rm -f .github/workflows/assemble-operational-service.yml

      - name: Commit assembled sources
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add remaining operational service sources"
          git push origin HEAD:agent/operational-trust-receipt-service
