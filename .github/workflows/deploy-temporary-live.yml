name: Deploy temporary live Trust Receipt API

on:
  push:
    branches:
      - agent/cloudflare-temporary-live-20260721
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: service

    steps:
      - name: Checkout verified source
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate service
        run: npm test

      - name: Build temporary Cloudflare configuration
        run: |
          set -euo pipefail
          umask 077
          node tools/generate-issuer-keypair.mjs > issuer-keypair.json
          openssl rand -hex 32 > bootstrap-token.txt
          node <<'NODE'
          const fs = require('node:fs');
          const pair = JSON.parse(fs.readFileSync('issuer-keypair.json', 'utf8'));
          const config = {
            name: 'ai-trust-receipt-service',
            main: 'src/index.mjs',
            compatibility_date: '2026-07-21',
            workers_dev: true,
            vars: {
              PUBLIC_BASE_URL: 'https://temporary.invalid',
              ISSUER_ORGANIZATION_ID: 'org:emotional-infrastructure',
              ISSUER_DISPLAY_NAME: 'Emotional Infrastructure',
              ISSUER_KEY_ID: 'ei-ed25519-2026-01',
              ALLOWED_ORIGINS: 'https://demo.emotionalinfrastructure.org,https://emotionalinfrastructure.org',
              DECISION_TTL_SECONDS: '600',
              ISSUER_PRIVATE_KEY_PKCS8_BASE64: pair.private_key_pkcs8_base64,
              ISSUER_PUBLIC_KEY_SPKI_BASE64: pair.public_key_spki_base64,
              BOOTSTRAP_ADMIN_TOKEN: fs.readFileSync('bootstrap-token.txt', 'utf8').trim()
            },
            d1_databases: [{
              binding: 'DB',
              database_name: 'ai-trust-receipts',
              migrations_dir: 'migrations'
            }]
          };
          fs.writeFileSync('wrangler.temporary.jsonc', JSON.stringify(config, null, 2));
          NODE

      - name: Deploy temporary Worker and provision D1
        run: |
          set -euo pipefail
          mkdir -p private-claim verification-evidence
          npx --yes wrangler@4.112.0 deploy --temporary --config wrangler.temporary.jsonc > deploy.log 2>&1
          python <<'PY'
          from pathlib import Path
          import json
          import re
          from datetime import datetime, timezone

          raw = Path('deploy.log').read_text(errors='replace')
          clean = re.sub(r'\x1B\[[0-?]*[ -/]*[@-~]', '', raw)
          worker_urls = re.findall(r'https://[A-Za-z0-9.-]+\.workers\.dev', clean)
          claim_urls = re.findall(r'https://dash\.cloudflare\.com/claim-preview\?claimToken=[^\s]+', clean)
          if not worker_urls or not claim_urls:
              raise SystemExit('Wrangler did not return the temporary deployment URLs.')
          worker_url = worker_urls[-1].rstrip('.,)')
          claim_url = claim_urls[-1].rstrip('.,)')
          Path('worker-url.txt').write_text(worker_url)
          Path('private-claim/claim.json').write_text(json.dumps({
              'worker_url': worker_url,
              'claim_url': claim_url,
              'created_at': datetime.now(timezone.utc).isoformat(),
              'instruction': 'Complete the Cloudflare dashboard claim within 60 minutes.'
          }, indent=2))
          PY
          rm -f deploy.log

      - name: Apply D1 migration
        run: |
          set -euo pipefail
          npx --yes wrangler@4.112.0 d1 migrations apply ai-trust-receipts --remote --config wrangler.temporary.jsonc > migration.log 2>&1

      - name: Publish correct public base URL
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('node:fs');
          const config = JSON.parse(fs.readFileSync('wrangler.temporary.jsonc', 'utf8'));
          config.vars.PUBLIC_BASE_URL = fs.readFileSync('worker-url.txt', 'utf8').trim();
          fs.writeFileSync('wrangler.temporary.jsonc', JSON.stringify(config, null, 2));
          NODE
          npx --yes wrangler@4.112.0 deploy --temporary --config wrangler.temporary.jsonc > redeploy.log 2>&1
          rm -f redeploy.log

      - name: Verify live public endpoints
        run: |
          set -euo pipefail
          WORKER_URL="$(cat worker-url.txt)"
          for attempt in $(seq 1 20); do
            if curl -fsS "$WORKER_URL/health" > health.json; then
              break
            fi
            sleep 3
          done
          test -s health.json
          jq -e '.status == "ok" and .service == "ai-trust-receipt"' health.json >/dev/null
          curl -fsS "$WORKER_URL/.well-known/ai-trust-receipt-keys.json" > keys.json
          jq -e '.keys | length >= 1' keys.json >/dev/null
          jq -n \
            --arg worker_url "$WORKER_URL" \
            --arg source_commit "$GITHUB_SHA" \
            --slurpfile health health.json \
            --slurpfile keys keys.json \
            '{worker_url:$worker_url,source_commit:$source_commit,health:$health[0],issuer_key_count:($keys[0].keys|length),checks:["health","issuer-key-discovery","D1-migration","Worker-redeployment"]}' \
            > verification-evidence/verification-summary.json
          echo "### Temporary Cloudflare deployment verified" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Worker URL: $WORKER_URL" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Health, issuer-key discovery, D1 migration, and Worker redeployment passed." >> "$GITHUB_STEP_SUMMARY"

      - name: Upload private claim link
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-temporary-claim
          path: service/private-claim/
          if-no-files-found: warn
          retention-days: 1

      - name: Upload sanitized verification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-temporary-verification
          path: service/verification-evidence/
          if-no-files-found: warn
          retention-days: 7
