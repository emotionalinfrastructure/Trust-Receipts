name: Implementation defect

description: Report a reproducible defect in the reference implementation, CLI, schemas, tests, fixtures, packaging, or documentation.

title: "[Bug]: "

labels:
  - bug

body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a defect. Do not disclose security vulnerabilities or confidential receipt data here. Follow `SECURITY.md` for private reporting.

  - type: input
    id: version
    attributes:
      label: Version or commit
      description: Identify the candidate version, tag, branch, or commit tested.
      placeholder: v0.1.0 or commit SHA
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Affected component
      options:
        - Reference implementation
        - Command-line interface
        - JSON Schema
        - Conformance profile
        - Test or fixture
        - Release verification
        - Packaging
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: observed
    attributes:
      label: Observed behavior
      description: State what happened, including the exact output or error when useful.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: State what the specification, schema, test, or documented interface led you to expect.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Provide commands, synthetic inputs, and steps sufficient to reproduce the issue.
      render: shell
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include operating system, Python version, installation method, and relevant tool versions.
      render: text
    validations:
      required: true

  - type: textarea
    id: governance-impact
    attributes:
      label: Governance or conformance impact
      description: Explain whether the defect could affect authority gating, evidence, integrity, human disclosure, remedy, affected-party visibility, or a conformance result.

  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: I used synthetic or non-confidential data.
          required: true
        - label: This report does not disclose a security vulnerability requiring private handling.
          required: true
        - label: I have not described the result as certification, legal compliance, or regulatory approval.
          required: true
